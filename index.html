<!DOCTYPE html>
<html>
<head>
    <title>Theos sword demo</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        /* Styles for the object switcher and arrows */
        .object-switcher {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #00ffff;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80vw;
        }
        .object-button {
            background: transparent;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        .object-button:hover {
            background: #00ffff22;
        }
        .object-button.active {
            background: #00ffff;
            color: black;
        }

        .arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            cursor: pointer;
            text-shadow: 0 0 5px #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            display: none;
        }

        .arrow.left {
            left: 20px;
        }

        .arrow.right {
            right: 20px;
        }

        .arrow:hover {
            background: rgba(0, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Arrow buttons -->
    <button class="arrow left" id="leftArrow">◄</button>
    <button class="arrow right" id="rightArrow">►</button>

    <!-- Object switcher -->
    <div class="object-switcher" id="object-switcher"></div>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
        }
    }
    </script>

    <!-- JavaScript code -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Import shaders for volumetric lighting
        import { VolumetricLightShader } from 'three/addons/shaders/VolumetricLightShader.js';
        import { AdditiveBlendingShader } from 'three/addons/shaders/AdditiveBlendingShader.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.FogExp2(0x111111, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(5, 5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Effect Composer for post-processing
        const composer = new EffectComposer(renderer);
        composer.setSize(window.innerWidth, window.innerHeight);

        // Render Pass
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        // Bloom Pass (adjust parameters as needed)
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.24, // Bloom strength
            0.5,  // Radius
            0.2   // Threshold
        );
        composer.addPass(bloomPass);

        // Create render targets for occlusion and god rays
        const width = window.innerWidth;
        const height = window.innerHeight;
        const rtTextureColors = new THREE.WebGLRenderTarget(width, height);
        const rtTextureDepth = new THREE.WebGLRenderTarget(width, height);
        const rtTextureGodRays = new THREE.WebGLRenderTarget(width, height);

        // God Rays Shader Pass
        const godRaysPass = new ShaderPass(VolumetricLightShader);
        composer.addPass(godRaysPass);

        // Additive Blending Shader Pass
        const finalPass = new ShaderPass(AdditiveBlendingShader);
        composer.addPass(finalPass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Create a bright point light to act as the sun
        const sunPosition = new THREE.Vector3(0, 1000, -1000);
        const sunLight = new THREE.PointLight(0xffffff, 1.5, 0, 2);
        sunLight.position.copy(sunPosition);
        scene.add(sunLight);

        // Add a mesh to represent the sun
        const sunGeometry = new THREE.SphereGeometry(50, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        sunMesh.position.copy(sunPosition);
        scene.add(sunMesh);

        // Floor
        const floorGeometry = new THREE.PlaneGeometry(1000, 1000);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2; // Rotate to lay it flat
        floor.position.y = -10; // Floor position
        floor.receiveShadow = true; // Allow the floor to receive shadows
        scene.add(floor);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Loaders
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        // Global references
        window.objectsLibrary = new Map();
        window.currentObject = null;
        let currentIndex = 0;

        // Arrow controls
        const leftArrow = document.getElementById('leftArrow');
        const rightArrow = document.getElementById('rightArrow');

        function updateArrowVisibility() {
            const objects = Array.from(window.objectsLibrary.keys());
            leftArrow.style.display = currentIndex > 0 ? 'block' : 'none';
            rightArrow.style.display = currentIndex < objects.length - 1 ? 'block' : 'none';
        }

        leftArrow.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                const objects = Array.from(window.objectsLibrary.keys());
                switchToObject(objects[currentIndex]);
            }
        };

        rightArrow.onclick = () => {
            const objects = Array.from(window.objectsLibrary.keys());
            if (currentIndex < objects.length - 1) {
                currentIndex++;
                switchToObject(objects[currentIndex]);
            }
        };

        function updateObjectSwitcher() {
            const switcher = document.getElementById('object-switcher');
            switcher.innerHTML = '';
            window.objectsLibrary.forEach((object, name) => {
                const button = document.createElement('button');
                button.className = 'object-button';
                if (window.currentObject === object) {
                    button.classList.add('active');
                }
                button.textContent = name;
                button.onclick = () => {
                    const objects = Array.from(window.objectsLibrary.keys());
                    currentIndex = objects.indexOf(name);
                    switchToObject(name);
                };
                switcher.appendChild(button);
            });
            updateArrowVisibility();
        }

        function switchToObject(name) {
            if (window.currentObject) {
                scene.remove(window.currentObject);
            }

            if (name && window.objectsLibrary.has(name)) {
                window.currentObject = window.objectsLibrary.get(name);
                scene.add(window.currentObject);
            }

            updateObjectSwitcher();
        }

        async function loadModels() {
            try {
                const response = await fetch('models/models.json');
                const modelFiles = await response.json();

                for (const fileName of modelFiles) {
                    await loadObject(fileName);
                }

                if (modelFiles.length > 0) {
                    currentIndex = 0;
                    switchToObject(modelFiles[0].replace(/\.[^/.]+$/, ""));
                }
            } catch (error) {
                console.error('Error loading models:', error);
            }
        }

        function loadObject(fileName) {
            const url = `models/${fileName}`;

            return new Promise((resolve) => {
                loader.load(url, function (gltf) {
                    const object = gltf.scene;

                    object.traverse(function (node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());
                    object.position.sub(center);

                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 5 / maxDim;
                    object.scale.multiplyScalar(scale * 2);

                    object.rotation.x = THREE.MathUtils.degToRad(2);

                    const name = fileName.replace(/\.[^/.]+$/, "");
                    window.objectsLibrary.set(name, object);

                    resolve();
                }, undefined, function (error) {
                    console.error('Error loading object:', error);
                    resolve();
                });
            });
        }

        loadModels();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (window.currentObject) {
                window.currentObject.rotation.y += 0.005;
            }

            // Update light position in screen space
            const sunScreenPosition = sunPosition.clone().project(camera);

            // Update uniforms for god rays shader
            godRaysPass.uniforms['lightPosition'].value.set(
                sunScreenPosition.x * 0.5 + 0.5,
                sunScreenPosition.y * 0.5 + 0.5
            );
            godRaysPass.uniforms['density'].value = 0.96;
            godRaysPass.uniforms['decay'].value = 0.93;
            godRaysPass.uniforms['weight'].value = 0.4;
            godRaysPass.uniforms['exposure'].value = 0.6;

            // Render scene into render target for god rays
            renderer.setRenderTarget(rtTextureColors);
            renderer.clear();
            renderer.render(scene, camera);

            // Render only the sun into depth render target
            const occlusionScene = new THREE.Scene();
            occlusionScene.add(sunMesh);
            renderer.setRenderTarget(rtTextureDepth);
            renderer.clear();
            renderer.render(occlusionScene, camera);

            // Apply god rays effect
            godRaysPass.uniforms['tDiffuse'].value = rtTextureDepth.texture;
            renderer.setRenderTarget(rtTextureGodRays);
            renderer.clear();
            composer.render();

            // Final composite
            finalPass.uniforms['tDiffuse'].value = rtTextureColors.texture;
            finalPass.uniforms['tAdd'].value = rtTextureGodRays.texture;
            renderer.setRenderTarget(null);
            composer.render();
        }
        animate();

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
